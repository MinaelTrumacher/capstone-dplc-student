{{- if .Values.dbSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.dbSecret.name }}
  labels:
    {{- include "worldcup.labels" . | nindent 4 }}
type: Opaque
stringData:
  db-username: {{ .Values.dbSecret.username | quote }}
  db-password: {{ required "dbSecret.password is required — pass via --set dbSecret.password=..." .Values.dbSecret.password | quote }}
{{- end }}
