apiVersion: v2
name: worldcup
description: Application Coupe du Monde 2026 — Express.js + PostgreSQL sur Kubernetes
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: postgresql
    version: "15.5.23"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: kube-prometheus-stack
    version: "61.7.1"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: monitoring.enabled
