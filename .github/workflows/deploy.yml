name: Build & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/worldcup-app

jobs:
  # ─── Job 1 : Tests + Build image ──────────────────────────────────────────
  build:
    name: Test & Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies (dev)
        working-directory: app
        run: npm ci

      - name: Run tests
        working-directory: app
        run: npm test

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 2 : Helm lint + template ─────────────────────────────────────────
  helm-lint:
    name: Helm lint & template
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.15.0"

      - name: Helm dependency update
        working-directory: deploy/helm/worldcup
        run: helm dependency update

      - name: Helm lint
        run: |
          helm lint deploy/helm/worldcup \
            --set dbSecret.password=test123 \
            --set image.tag=sha-abc1234

      - name: Helm template (dry-run)
        run: |
          helm template worldcup deploy/helm/worldcup \
            --set dbSecret.password=test123 \
            --set image.tag=sha-abc1234 \
            > /tmp/rendered.yaml
          echo "Template OK — $(wc -l < /tmp/rendered.yaml) lignes générées"

  # ─── Job 3 : Déploiement en production (push sur main seulement) ──────────
  deploy:
    name: Deploy to production (k3s)
    runs-on: ubuntu-latest
    needs: [build, helm-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.15.0"

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Helm dependency update
        working-directory: deploy/helm/worldcup
        run: helm dependency update

      - name: Extract short SHA
        id: sha
        run: echo "tag=sha-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Helm upgrade (deploy)
        run: |
          helm upgrade --install worldcup deploy/helm/worldcup \
            -f deploy/helm/worldcup/values.yaml \
            -f deploy/helm/worldcup/values-prod.yaml \
            --set dbSecret.password="${{ secrets.DB_PASSWORD }}" \
            --set image.tag="${{ steps.sha.outputs.tag }}" \
            --namespace worldcup \
            --create-namespace \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          kubectl -n worldcup rollout status deployment/worldcup --timeout=120s
          kubectl -n worldcup get pods
